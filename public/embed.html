<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Figma Contributions</title>
  <link rel="stylesheet" href="embed.css" />
</head>
<body>
  <div class="embed-container">
    <div class="embed-header">
      <div class="embed-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="4" width="7" height="7" rx="1.5" fill="#A259FF"/>
          <rect x="13" y="4" width="7" height="7" rx="3.5" fill="#F24E1E"/>
          <rect x="4" y="13" width="7" height="7" rx="3.5" fill="#0ACF83"/>
          <circle cx="16.5" cy="16.5" r="3.5" fill="#1ABCFE"/>
        </svg>
        <span>Figma Contributions</span>
      </div>
      <span class="embed-subtitle" id="embed-subtitle"></span>
    </div>

    <div class="heatmap-wrap">
      <div class="heatmap-months" id="heatmap-months"></div>
      <div class="heatmap-grid-wrap">
        <div class="heatmap-days">
          <span></span><span>Mon</span><span></span><span>Wed</span><span></span><span>Fri</span><span></span>
        </div>
        <div class="heatmap-grid" id="heatmap-grid"></div>
      </div>
    </div>

    <div class="heatmap-footer">
      <div class="heatmap-legend">
        <span>Less</span>
        <div class="legend-box" data-level="0"></div>
        <div class="legend-box" data-level="1"></div>
        <div class="legend-box" data-level="2"></div>
        <div class="legend-box" data-level="3"></div>
        <div class="legend-box" data-level="4"></div>
        <span>More</span>
      </div>
    </div>
  </div>

  <script src="embed.js"></script>
</body>
</html>
